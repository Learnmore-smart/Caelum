name: Build & Release

on:
  push:
    tags:
      - 'v*'          # Push a tag like v1.0.0 to trigger a release
  workflow_dispatch:    # Also allow manual trigger from GitHub Actions tab

permissions:
  contents: write      # Needed to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained, single-file)
        run: >
          dotnet publish WindowsNotesApp.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Zip release
        run: Compress-Archive -Path publish\* -DestinationPath WindowsNotesApp-win-x64.zip

      # ── When triggered by a tag push → create a GitHub Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WindowsNotesApp-win-x64.zip
          generate_release_notes: true

      # ── Always upload as an artifact (manual runs too) ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowsNotesApp-win-x64
          path: publish/
